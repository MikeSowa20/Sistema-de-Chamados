<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chamado Respondido</title>
</head>
<body style="
    margin:0;
    padding:0;
    background-color:#f4f7fa;
    font-family:Arial, Helvetica, sans-serif;
">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">

                <table width="700" cellpadding="0" cellspacing="0" style="
                    background:white;
                    overflow:hidden;
                    box-shadow:0 4px 15px rgba(0,0,0,0.1);
                ">

                    <!-- Cabeçalho -->
                    <tr>
                        <td style="
                            background:#383838;
                            color:white;
                            padding:30px;
                            text-align:center;
                        ">
                            <h1 style="margin:0;">
                                Sistema de Chamados
                            </h1>

                            <p style="
                                margin-top:10px;
                                opacity:0.9;
                            ">
                                Seu chamado recebeu uma resposta
                            </p>
                        </td>
                    </tr>

                    <!-- Conteúdo -->
                    <tr>
                        <td style="padding:35px;">

                            <p style="
                                font-size:16px;
                                color:#374151;
                            ">
                                Olá, <strong>{{ nome }}</strong>.
                            </p>

                            <p style="
                                font-size:15px;
                                color:#6b7280;
                            ">
                                O administrador respondeu ao seu chamado.
                            </p>

                            <!-- Chamado -->
                            <div style="
                                background:#f8fafc;
                                border-left:5px solid #383838;
                                padding:20px;
                                margin-top:25px;
                            ">

                                <h2 style="
                                    margin-top:0;
                                    color:#1e293b;
                                ">
                                    {{ titulo|safe }}
                                </h2>

                                <p style="
                                    color:#475569;
                                    line-height:1.6;
                                    margin-bottom:0;
                                ">
                                    {{ corpo|safe }}
                                </p>

                            </div>

                            <!-- Resposta -->
                            <div style="
                                background:#ecfdf5;
                                border-left:5px solid #10b981;
                                padding:20px;
                                margin-top:25px;
                            ">

                                <h3 style="
                                    margin-top:0;
                                    color:#065f46;
                                ">
                                    Resposta da Equipe
                                </h3>

                                <p style="
                                    color:#064e3b;
                                    line-height:1.6;
                                    margin-bottom:0;
                                ">
                                    {{ resposta|safe}}
                                </p>

                            </div>

                            <!-- Botão -->
                            <div style="
                                text-align:center;
                                margin-top:35px;
                            ">

                                <a href="{{ link }}"
                                   style="
                                       background:#383838;;
                                       color:white;
                                       text-decoration:none;
                                       padding:14px 28px;
                                       border-radius:8px;
                                       display:inline-block;
                                       font-weight:bold;
                                   ">
                                    Acessar Sistema
                                </a>

                            </div>

                        </td>
                    </tr>

                    <!-- Rodapé -->
                    <tr>
                        <td style="
                            background:#383838;
                            text-align:center;
                            padding:20px;
                            color:#94a3b8;
                            font-size:13px;
                        ">
                            Esta é uma mensagem automática do sistema de chamados.
                            <br>
                            Não responda este e-mail.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
